<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- responsive pe mobil -->
    <title>Twisted World</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="parallax" id="parallax">
        <div class="layer" id="layerBack"><div class="layer-inner scroll-slow"></div></div>
        <div class="layer" id="layerMid"><div class="layer-inner scroll-mid"></div></div>
        <div class="layer" id="layerFront"><div class="layer-inner scroll-fast"></div></div>
    </div>

    <!-- ===================== LOBBY SCREEN ===================== -->
    <div class="screen active" id="lobbyScreen">
        <div class="menu">
            <img src="Assets/Lobby/Logo.png" class="logo" alt="Twisted World">
            <div class="spacing"></div>
            <div class="play-row" id="playRow">
                <img src="Assets/Lobby/Button1.png" class="button intro-1" id="playButton" alt="Play">
                <div class="level-select" id="levelSelect">
                    <div class="level-select-row" id="levelSelectRow"></div>
                </div>
            </div>
            <div class="play-row" id="settingsRow">
                <img src="Assets/Lobby/Button2.png" class="button intro-2" id="settingsButton" alt="Settings">
                <div class="level-select settings-select" id="settingsSelect">
                    <div class="level-select-row" id="settingsSelectRow"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===================== GAME SCREEN ===================== -->
    <div class="screen" id="gameScreen">
        <div class="game-wrap">
            <canvas id="gameCanvas"></canvas>

            <div class="game-ui">
                <div class="level-title" id="levelTitle">
                    <img class="level-word" src="Assets/LevelCounter/level.png" alt="Level">
                    <div class="level-digits" id="levelDigits"></div>
                </div>
                <button class="icon-button" id="backToLobby" title="Back to lobby">&#8592;</button>
            </div>
        </div>
    </div>

    <div class="win-banner" id="winBanner">
        <div class="win-card">
            <div class="win-title">Level Complete!</div>
            <button class="game-button" id="lobbyButton">Lobby</button>
        </div>
    </div>

    <!-- ===================== PRIVACY POLICY POPUP ===================== -->
    <!-- Se afișează o singură dată, la prima pornire a jocului în acest   -->
    <!-- browser (vezi Lobby.js pentru logica de "doar prima dată").      -->
    <!-- Folosim INTENȚIONAT aceleași clase ca la popup-ul "Level         -->
    <!-- Complete!" (.win-banner / .win-card / .win-title / .game-button) -->
    <!-- ca designul (fundal, blur, animația cardului, culori, font) să   -->
    <!-- fie identic, fără să mai scriem CSS separat pentru el.           -->
    <!-- Conținutul din interior NU mai e scris static aici: Lobby.js dă  -->
    <!-- fetch la PrivacyPolicy.md direct din repo (raw.githubusercontent -->
    <!-- .com) și îl injectează în #privacyContent la runtime. Tot ce e   -->
    <!-- vizibil (titlu, conținut, buton) e în engleză.                   -->
    <div class="win-banner" id="privacyBanner">
        <div class="win-card">
            <div class="win-title">Privacy Policy</div>
            <!-- Container gol, umplut dinamic din Lobby.js cu textul     -->
            <!-- luat direct din PrivacyPolicy.md (fetch la runtime).     -->
            <div class="privacy-content" id="privacyContent">
                <p class="privacy-text">Loading Privacy Policy…</p>
            </div>
            <!-- Trebuie apăsat OK ca popup-ul să dispară; nu se poate    -->
            <!-- închide dând click în afara lui (vezi Lobby.js).        -->
            <button class="game-button" id="privacyOkButton">OK</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="Levels.js"></script>
    <script src="Game.js"></script>
    <script src="Lobby.js"></script>

</body>
</html>
