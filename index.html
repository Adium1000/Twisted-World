<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- responsive pe mobil -->
    <title>Twisted World</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="parallax" id="parallax">
        <div class="layer" id="layerBack"><div class="layer-inner scroll-slow"></div></div> 
        <div class="layer" id="layerMid"><div class="layer-inner scroll-mid"></div></div>    
        <div class="layer" id="layerFront"><div class="layer-inner scroll-fast"></div></div> 
    </div>
    <div class="menu">
        <img src="Assets/Lobby/Logo.png" class="logo" alt="Twisted World">
        <div class="spacing"></div>
        <img src="Assets/Lobby/Button1.png" class="button" id="playButton" alt="Play">      
        <img src="Assets/Lobby/Button2.png" class="button" id="settingsButton" alt="Settings"> 
    </div>
    <script src="Lobby.js"></script> 

</body>
</html>
